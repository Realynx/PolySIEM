name: Release
run-name: Release ${{ github.ref_name }}

on:
  push:
    tags:
      - "v*"

env:
  NEXT_TELEMETRY_DISABLED: "1"
  ONNXRUNTIME_NODE_INSTALL: skip

jobs:
  validate:
    name: Validate release tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Validate version
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          test "$VERSION" = "$PACKAGE_VERSION" || {
            echo "Tag ${GITHUB_REF_NAME} does not match package.json (${PACKAGE_VERSION})" >&2
            exit 1
          }
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify release commit is on master
        shell: bash
        run: |
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/master; then
            echo "Release tags must point to a commit already pushed to master." >&2
            echo "Push master first, then push ${GITHUB_REF_NAME}." >&2
            exit 1
          fi

      - name: Verify packaged release inputs
        shell: bash
        run: |
          git ls-files --error-unmatch .env.example
          test -f README.md
          test -f LICENSE
          test -f deploy/auto-update.sh
          test -f deploy/native-auto-update.sh
          test -f deploy/standalone-entrypoint.sh
          test -f deploy/standalone-entrypoint.ps1
          test -f server/tls-server.js
          test -f server/cert-utils.js

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Verify release source
        run: npm run check

  docker:
    name: Build multi-architecture container
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image name
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            POLYSIEM_VERSION=${{ needs.validate.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  standalone-linux:
    name: Build Linux x64 standalone bundle
    needs: validate
    # Use the older supported runner baseline so native binaries do not inherit
    # a newer glibc requirement than common Debian/Ubuntu LXC guests provide.
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Build application
        run: |
          npm ci
          npx prisma generate
          npm run build
        env:
          SKIP_ENV_VALIDATION: "1"
          DATABASE_URL: postgresql://build:build@localhost:5432/build
          APP_SECRET: build-secret-placeholder-32-characters

      - name: Assemble Linux bundle
        shell: bash
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          STAGE="polysiem-${VERSION}"
          mkdir -p "${STAGE}/.next"
          cp -a .next/standalone/. "${STAGE}/"
          cp -a .next/static "${STAGE}/.next/static"
          # Next's file tracing can omit non-native Prisma engines. Copy the
          # complete generated client so the native bundle works across the
          # supported Debian/Ubuntu OpenSSL generations.
          mkdir -p "${STAGE}/node_modules"
          cp -a node_modules/.prisma "${STAGE}/node_modules/.prisma"
          test -f "${STAGE}/node_modules/.prisma/client/libquery_engine-debian-openssl-1.1.x.so.node"
          test -f "${STAGE}/node_modules/.prisma/client/libquery_engine-debian-openssl-3.0.x.so.node"
          cp -a public prisma "${STAGE}/"
          cp server/tls-server.js server/cert-utils.js "${STAGE}/"
          cp deploy/standalone-entrypoint.sh "${STAGE}/start.sh"
          cp deploy/polysiem.service "${STAGE}/polysiem.service"
          cp .env.example README.md LICENSE "${STAGE}/"
          chmod +x "${STAGE}/start.sh"
          PRISMA_VERSION="$(node -p "require('./package.json').devDependencies.prisma.replace(/^[^0-9]*/, '')")"
          npm install --prefix "${STAGE}/prisma-cli" --omit=dev --no-package-lock --no-save \
            "prisma@${PRISMA_VERSION}"
          tar -czf "polysiem-${VERSION}-standalone-linux-x64.tar.gz" "$STAGE"

      - name: Upload Linux bundle
        uses: actions/upload-artifact@v7
        with:
          name: standalone-linux
          path: polysiem-*-standalone-linux-x64.tar.gz
          if-no-files-found: error

  standalone-windows:
    name: Build Windows x64 standalone bundle
    needs: validate
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Build application
        shell: pwsh
        run: |
          npm ci
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          npx prisma generate
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          npm run build
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
        env:
          SKIP_ENV_VALIDATION: "1"
          DATABASE_URL: postgresql://build:build@localhost:5432/build
          APP_SECRET: build-secret-placeholder-32-characters

      - name: Assemble Windows bundle
        shell: pwsh
        run: |
          $version = "${{ needs.validate.outputs.version }}"
          $stage = "polysiem-$version"
          New-Item -ItemType Directory -Force -Path "$stage\.next" | Out-Null
          Copy-Item -Recurse -Force ".next\standalone\*" $stage
          Copy-Item -Recurse -Force ".next\static" "$stage\.next\static"
          Copy-Item -Recurse -Force "public", "prisma" $stage
          Copy-Item "server\tls-server.js", "server\cert-utils.js" $stage
          Copy-Item "deploy\standalone-entrypoint.ps1" "$stage\start.ps1"
          Copy-Item ".env.example", "README.md", "LICENSE" $stage
          $prismaVersion = node -p "require('./package.json').devDependencies.prisma.replace(/^[^0-9]*/, '')"
          npm install --prefix "$stage\prisma-cli" --omit=dev --no-package-lock --no-save "prisma@$prismaVersion"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          Compress-Archive -Path $stage -DestinationPath "polysiem-$version-standalone-windows-x64.zip"

      - name: Upload Windows bundle
        uses: actions/upload-artifact@v7
        with:
          name: standalone-windows
          path: polysiem-*-standalone-windows-x64.zip
          if-no-files-found: error

  deployment-assets:
    name: Package installers and deployment metadata
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Stage release assets
        shell: bash
        run: |
          mkdir release
          cp deploy/install.sh deploy/install.ps1 deploy/install-vm.sh release/
          cp deploy/update.sh deploy/update.ps1 deploy/auto-update.sh deploy/native-auto-update.sh deploy/docker-compose.yml deploy/docker-compose.demo.yml release/
          IMAGE_REPOSITORY="$(printf '%s' "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          jq -n \
            --arg version "${{ needs.validate.outputs.version }}" \
            --arg repository "${GITHUB_REPOSITORY}" \
            --arg image "ghcr.io/${IMAGE_REPOSITORY}:${{ needs.validate.outputs.version }}" \
            --arg nativeLinuxX64Bundle "polysiem-${{ needs.validate.outputs.version }}-standalone-linux-x64.tar.gz" \
            '{schemaVersion: 1, version: $version, repository: $repository, image: $image, platforms: {docker: ["linux/amd64", "linux/arm64"], installers: ["linux", "windows"]}, assets: {compose: "docker-compose.yml", demoCompose: "docker-compose.demo.yml", linuxInstaller: "install.sh", windowsInstaller: "install.ps1", linuxUpdater: "update.sh", linuxAutoUpdater: "auto-update.sh", nativeLinuxAutoUpdater: "native-auto-update.sh", windowsUpdater: "update.ps1", nativeLinuxInstaller: "install-vm.sh", nativeLinuxX64Bundle: $nativeLinuxX64Bundle}}' \
            > release/release-manifest.json

      - name: Upload deployment assets
        uses: actions/upload-artifact@v7
        with:
          name: deployment-assets
          path: release/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: [validate, docker, standalone-linux, standalone-windows, deployment-assets]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          path: release
          merge-multiple: true

      - name: Generate complete checksums
        shell: bash
        run: (cd release && sha256sum * > SHA256SUMS)

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          files: release/*
          fail_on_unmatched_files: true
          generate_release_notes: true

  promote-latest:
    name: Promote verified image to latest
    needs: [validate, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote release image
        shell: bash
        run: |
          IMAGE="ghcr.io/$(printf '%s' "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          docker buildx imagetools create \
            --tag "${IMAGE}:latest" \
            "${IMAGE}:${{ needs.validate.outputs.version }}"
