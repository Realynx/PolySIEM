apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "polysiem.fullname" . }}
  labels:
    {{- include "polysiem.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "polysiem.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/secret-inputs: {{ include "polysiem.rolloutChecksum" . }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- with .Values.podLabels }}
        {{- toYaml (omit . "app.kubernetes.io/name" "app.kubernetes.io/instance" "app.kubernetes.io/component") | nindent 8 }}
        {{- end }}
        {{- include "polysiem.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "polysiem.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: polysiem
          image: "{{ .Values.image.repository }}:{{ default .Chart.AppVersion .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: APP_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "polysiem.secretName" . }}
                  key: {{ .Values.secrets.keys.appSecret }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "polysiem.secretName" . }}
                  key: {{ .Values.secrets.keys.databaseUrl }}
            - name: APP_URL
              value: {{ .Values.config.appUrl | quote }}
            - name: POLYSIEM_TLS
              value: {{ ternary "on" "off" .Values.config.tls | quote }}
            - name: POLYSIEM_GITHUB_REPOSITORY
              value: {{ .Values.config.githubRepository | quote }}
            - name: POLYSIEM_INSTALL_TYPE
              value: kubernetes
            - name: MIGRATE_MAX_ATTEMPTS
              value: {{ .Values.migration.maxAttempts | quote }}
            - name: MIGRATE_RETRY_DELAY
              value: {{ .Values.migration.retryDelaySeconds | quote }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          startupProbe:
            {{- toYaml .Values.startupProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "polysiem.persistenceClaimName" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . | quote }}
      {{- end }}
