{{- if not .Values.secrets.existingSecret }}
{{- $secretName := include "polysiem.secretName" . -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $passwordKey := .Values.secrets.keys.databasePassword -}}
{{- $appSecretKey := .Values.secrets.keys.appSecret -}}
{{- $annotations := dict -}}
{{- if $existing -}}
  {{- $annotations = (default (dict) $existing.metadata.annotations) -}}
{{- end -}}
{{- if and $existing .Values.postgresql.enabled -}}
  {{- $oldUsername := index $annotations "polysiem.io/postgresql-username" -}}
  {{- $oldDatabase := index $annotations "polysiem.io/postgresql-database" -}}
  {{- if and $oldUsername (ne $oldUsername .Values.postgresql.auth.username) -}}
    {{- fail "postgresql.auth.username is immutable after bundled PostgreSQL has been initialized; restore the old value or migrate the database manually" -}}
  {{- end -}}
  {{- if and $oldDatabase (ne $oldDatabase .Values.postgresql.auth.database) -}}
    {{- fail "postgresql.auth.database is immutable after bundled PostgreSQL has been initialized; restore the old value or migrate the database manually" -}}
  {{- end -}}
  {{- if and .Values.postgresql.auth.password (hasKey $existing.data $passwordKey) -}}
    {{- $oldPassword := (index $existing.data $passwordKey | b64dec) -}}
    {{- if ne $oldPassword .Values.postgresql.auth.password -}}
      {{- fail "postgresql.auth.password cannot be rotated by changing Helm values on an initialized database; restore the old value or rotate the PostgreSQL role and Secret together" -}}
    {{- end -}}
  {{- end -}}
{{- end -}}
{{- $databasePassword := .Values.postgresql.auth.password -}}
{{- if not $databasePassword -}}
  {{- if and $existing (hasKey $existing.data $passwordKey) -}}
    {{- $databasePassword = (index $existing.data $passwordKey | b64dec) -}}
  {{- else -}}
    {{- $databasePassword = randAlphaNum 48 -}}
  {{- end -}}
{{- end -}}
{{- $appSecret := .Values.config.appSecret -}}
{{- if not $appSecret -}}
  {{- if and $existing (hasKey $existing.data $appSecretKey) -}}
    {{- $appSecret = (index $existing.data $appSecretKey | b64dec) -}}
  {{- else -}}
    {{- $appSecret = randAlphaNum 64 -}}
  {{- end -}}
{{- end -}}
{{- $databaseUrl := .Values.config.databaseUrl -}}
{{- if .Values.postgresql.enabled -}}
  {{- $databaseUrl = printf "postgresql://%s:%s@%s:%v/%s" (urlquery .Values.postgresql.auth.username) (urlquery $databasePassword) (include "polysiem.postgresqlFullname" .) .Values.postgresql.service.port (urlquery .Values.postgresql.auth.database) -}}
{{- else -}}
  {{- $databaseUrl = required "config.databaseUrl is required when postgresql.enabled is false and secrets.existingSecret is empty" $databaseUrl -}}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "polysiem.labels" . | nindent 4 }}
  {{- if or .Values.secrets.keep .Values.postgresql.enabled }}
  annotations:
    {{- if .Values.secrets.keep }}
    helm.sh/resource-policy: keep
    {{- end }}
    {{- if .Values.postgresql.enabled }}
    polysiem.io/postgresql-username: {{ .Values.postgresql.auth.username | quote }}
    polysiem.io/postgresql-database: {{ .Values.postgresql.auth.database | quote }}
    {{- end }}
  {{- end }}
type: Opaque
data:
  {{ .Values.secrets.keys.appSecret | quote }}: {{ $appSecret | b64enc | quote }}
  {{ .Values.secrets.keys.databaseUrl | quote }}: {{ $databaseUrl | b64enc | quote }}
  {{ .Values.secrets.keys.databasePassword | quote }}: {{ $databasePassword | b64enc | quote }}
{{- end }}
