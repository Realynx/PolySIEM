{{- if .Values.postgresql.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "polysiem.postgresqlFullname" . }}
  labels:
    {{- include "polysiem.postgresqlLabels" . | nindent 4 }}
spec:
  clusterIP: None
  ports:
    - name: postgresql
      port: {{ .Values.postgresql.service.port }}
      targetPort: postgresql
      protocol: TCP
  selector:
    {{- include "polysiem.postgresqlSelectorLabels" . | nindent 4 }}
{{- end }}
