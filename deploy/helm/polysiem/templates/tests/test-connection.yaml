apiVersion: v1
kind: Pod
metadata:
  name: {{ printf "%s-test-connection" (include "polysiem.fullname" .) | trunc 63 | trimSuffix "-" }}
  labels:
    {{- include "polysiem.commonLabels" . | nindent 4 }}
    app.kubernetes.io/name: {{ include "polysiem.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: test
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  automountServiceAccountToken: false
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534
    runAsGroup: 65534
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: wget
      image: busybox:1.37
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
      command:
        - wget
      args:
        - --spider
        - --timeout=5
        - "http://{{ include "polysiem.fullname" . }}:{{ .Values.service.port }}/api/health"
