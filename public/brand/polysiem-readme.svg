<svg xmlns="http://www.w3.org/2000/svg" width="960" height="320" viewBox="0 0 960 320" role="img" aria-labelledby="title desc">
  <title id="title">PolySIEM</title>
  <desc id="desc">PolySIEM logo with the tagline Homelab intelligence, documented.</desc>
  <defs>
    <linearGradient id="panel" x1="40" y1="20" x2="920" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0b1226"/>
      <stop offset=".52" stop-color="#111936"/>
      <stop offset="1" stop-color="#171738"/>
    </linearGradient>
    <linearGradient id="brand" x1="421" y1="42" x2="538" y2="157" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientTransform="translate(480 129) rotate(90) scale(193 420)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4f46e5" stop-opacity=".26"/>
      <stop offset="1" stop-color="#4f46e5" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#a5b4fc" stroke-opacity=".055"/>
    </pattern>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#020617" flood-opacity=".48"/>
    </filter>
  </defs>

  <rect x="4" y="4" width="952" height="312" rx="28" fill="url(#panel)"/>
  <rect x="4" y="4" width="952" height="312" rx="28" fill="url(#glow)"/>
  <rect x="4" y="4" width="952" height="312" rx="28" fill="url(#grid)"/>
  <rect x="4.75" y="4.75" width="950.5" height="310.5" rx="27.25" fill="none" stroke="#818cf8" stroke-opacity=".26" stroke-width="1.5"/>

  <g opacity=".32" fill="#818cf8">
    <circle cx="92" cy="73" r="3"/>
    <circle cx="122" cy="73" r="3"/>
    <circle cx="152" cy="73" r="3"/>
    <path d="M95 250h94M771 71h94" stroke="#818cf8" stroke-width="2" stroke-linecap="round"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="420" y="37" width="120" height="120" rx="29" fill="url(#brand)"/>
    <rect x="421" y="38" width="118" height="118" rx="28" fill="none" stroke="#fff" stroke-opacity=".18" stroke-width="2"/>
    <g transform="translate(441 58) scale(3.25)" fill="#fff">
      <rect x="3" y="3" width="8" height="8" rx="2.5"/>
      <rect x="13" y="3" width="8" height="8" rx="2.5" opacity=".68"/>
      <rect x="3" y="13" width="8" height="8" rx="2.5" opacity=".68"/>
      <path d="M17 12.5c.15 2.55 1.95 4.35 4.5 4.5-2.55.15-4.35 1.95-4.5 4.5-.15-2.55-1.95-4.35-4.5-4.5 2.55-.15 4.35-1.95 4.5-4.5Z"/>
    </g>
  </g>

  <text x="480" y="224" fill="#f8fafc" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="56" font-weight="750" letter-spacing="3" text-anchor="middle">POLYSIEM</text>
  <text x="480" y="267" fill="#c7d2fe" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="20" font-weight="500" letter-spacing="4" text-anchor="middle">HOMELAB INTELLIGENCE, DOCUMENTED</text>
</svg>
