<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline · PolySIEM</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        margin: 0; min-height: 100svh; display: flex; align-items: center; justify-content: center;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        background: #fafafa; color: #171717;
      }
      @media (prefers-color-scheme: dark) { body { background: #0a0a0a; color: #ededed; } }
      main { text-align: center; padding: 2rem; }
      .tile {
        width: 56px; height: 56px; margin: 0 auto 1rem; border-radius: 14px;
        background: linear-gradient(135deg, #4f46e5, #6d3ee8 55%, #9333ea);
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 10px 25px rgba(109, 62, 232, .22);
      }
      h1 { font-size: 1.1rem; margin: 0 0 .35rem; }
      p { margin: 0 0 1.25rem; font-size: .9rem; opacity: .7; }
      button {
        font: inherit; padding: .5rem 1.1rem; border-radius: 10px; border: 0; cursor: pointer;
        background: #5b4cf0; color: #fff;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="tile">
        <svg width="34" height="34" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M5.25 3.75h6.5c4.56 0 7.5 3.18 7.5 8.25s-2.94 8.25-7.5 8.25h-6.5V3.75Z" stroke="#fff" stroke-width="2.1" stroke-linejoin="round"/>
          <path d="M9.25 8v7.25h5.5" stroke="#fff" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="9.25" cy="8" r="1.35" fill="#fff"/>
          <circle cx="14.75" cy="15.25" r="1.35" fill="#fff"/>
        </svg>
      </div>
      <h1>You&rsquo;re offline</h1>
      <p>PolySIEM needs a connection to your homelab to load live data.</p>
      <button onclick="location.reload()">Try again</button>
    </main>
  </body>
</html>
